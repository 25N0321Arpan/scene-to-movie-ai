story:
  provider: "gemini"
  model: "gemini-2.0-flash"
  temperature: 0.8
  num_scenes: 5

design:
  provider: "huggingface"
  model: "stabilityai/stable-diffusion-xl-base-1.0"
  style: "anime"
  width: 1024
  height: 1024
  lora_models: []

animation:
  provider: "local"
  duration_per_scene: 5.0
  fps: 24

voice:
  provider: "edge-tts"
  default_model: "en-US-AriaNeural"

editing:
  output_format: "mp4"
  resolution: "1920x1080"
  fps: 24
  codec: "h264"
  transition: "crossfade"
  transition_duration: 0.5

output:
  base_dir: "output"
